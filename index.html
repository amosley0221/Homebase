<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Homebase</title>
<meta name="description" content="Personal dashboard — weather, mail, calendar, sports, news, notes, to-dos, and an AI assistant." />

<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#0c1530" id="themeColorMeta" />
<meta name="color-scheme" content="dark light" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Homebase" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

<script>
  (function () {
    try {
      var raw = localStorage.getItem("dashTheme");
      var theme = raw ? JSON.parse(raw).theme : "dark";
      document.documentElement.setAttribute("data-theme", theme);
      var bg = theme === "light" ? "#f6f5f1" : "#0c1530";
      var meta = document.getElementById("themeColorMeta");
      if (meta) meta.setAttribute("content", bg);
      document.documentElement.style.background = bg;
    } catch (e) {}
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/dashboard.css" />

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://alcdn.msauth.net/browser/3.10.0/js/msal-browser.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="dashboard.jsx"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("/sw.js").catch(function () {});
    });
  }
</script>
</body>
</html>
