services:
  - type: web
    runtime: static
    name: homebase
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    headers:
      - path: /sw.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /manifest.webmanifest
        name: Content-Type
        value: application/manifest+json
      - path: /*.jsx
        name: Content-Type
        value: text/babel
    routes:
      - type: rewrite
        source: /
        destination: /index.html
